##
# @author Alexander Breuer (alex.breuer AT uni-jena.de)
# @section DESCRIPTION
# Continuous integration using GitHub Actions.
##
name: Tsunami Lab

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: 0 0 * * *

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y scons valgrind cppcheck libnetcdf-dev
          git submodule update --init submodules/Catch2

      - name: Static Code Analysis
        run: |
          cppcheck src/ --template=gcc --force --error-exitcode=1 --suppress=shiftTooManyBits

      - name: Sanitize
        run: |
          scons mode=debug+san
          ./build/tests
          ./build/tsunami_lab 100 100 0 100 0 100 1 1 10 1d outflow dam_break_1d 5 0 2 0 50
          scons mode=release+san
          ./build/tests
          ./build/tsunami_lab 100 100 0 100 0 100 1 1 10 2d dam_break_1d 5 0 2 0 50

      - name: Valgrind
        timeout-minutes: 20
        run: |
          scons mode=debug
          export OMP_NUM_THREADS=1
          VALGRIND_OPTS=(--leak-check=full --errors-for-leak-kinds=definite,indirect --error-exitcode=1)
          mapfile -t test_names < <(./build/tests --list-test-names-only)
          for test_name in "${test_names[@]}"; do
            [ -n "$test_name" ] || continue
            echo "Running valgrind for Catch2 test: $test_name"
            timeout 2m valgrind "${VALGRIND_OPTS[@]}" ./build/tests "$test_name"
          done
          timeout 2m valgrind "${VALGRIND_OPTS[@]}" ./build/tsunami_lab 100 100 0 100 0 100 1 1 10 1d outflow dam_break_1d 5 0 2 0 50

      - name: Release
        run: |
          scons
          ./build/tests
          ./build/tsunami_lab 100 100 0 100 0 100 1 1 10 2d dam_break_1d 5 0 2 0 50

  CUDA:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y scons libnetcdf-dev
          git submodule update --init submodules/Catch2

      - name: Build
        run: |
          scons mode=release
          ./build/tests

      - name: Note
        run: |
          echo "GPU-accelerated CUDA kernels require physical NVIDIA GPU and CUDA toolkit"
          echo "Run 'nix-shell' locally for full CUDA testing"