name: Build and Deploy Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install Doxygen
        run: sudo apt-get install -y doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Sphinx
        run: |
          pip install sphinx

      # -------------------------
      # Build Doxygen
      # -------------------------
      - name: Run Doxygen
        run: |
          doxygen docs/Doxyfile

      # -------------------------
      # Build Sphinx
      # -------------------------
      - name: Build Sphinx docs
        run: |
          sphinx-build -b html sphinx/source sphinx/build

      # -------------------------
      # Prepare Pages content
      # -------------------------
      - name: Prepare combined site
        run: |
          mkdir -p _site/doxygen
          mkdir -p _site/sphinx

          cp -r html/* _site/doxygen/ || true
          cp -r sphinx/build/* _site/sphinx/

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4