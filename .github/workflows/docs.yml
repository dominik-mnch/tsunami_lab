name: Build and Deploy Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install Doxygen
        run: sudo apt-get install -y doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Sphinx + theme
        run: |
          pip install sphinx sphinx-rtd-theme sphinxcontrib-video

      # -------------------------
      # Build Doxygen
      # -------------------------
      - name: Run Doxygen
        working-directory: docs
        run: doxygen Doxyfile

      # -------------------------
      # Build Sphinx
      # -------------------------
      - name: Build Sphinx docs
        run: |
          sphinx-build -E -b html sphinx/source sphinx/build

      # -------------------------
      # Prepare Pages content
      # -------------------------
      - name: Prepare combined site
        run: |
          rm -rf _site
          mkdir -p _site/doxygen
          mkdir -p _site/sphinx

          cp -r docs/html/* _site/doxygen/ || true
          cp -r sphinx/build/* _site/sphinx/

      # --------------------------
      # Create landing page
      # --------------------------
      - name: Create landing page
        run: |
          cat <<EOF > _site/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>Documentation</title>
          </head>
          <body>
              <h1>Documentation</h1>
              <ul>
                  <li><a href="sphinx/">Sphinx Docs</a></li>
                  <li><a href="doxygen/">Doxygen Docs</a></li>
              </ul>
          </body>
          </html>
          EOF

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4